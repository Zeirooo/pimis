services:
  mysql:
    image: mysql:8.4
    container_name: pimis-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pimis
      MYSQL_USER: pimis
      MYSQL_PASSWORD: pimis123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pimis-backend
    restart: unless-stopped
    working_dir: /app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: mysql+aiomysql://pimis:pimis123@mysql:3306/pimis?charset=utf8mb4
      CORS_ALLOW_ORIGINS: http://localhost:8081,http://127.0.0.1:8081
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app/backend
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/api/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: pimis-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    ports:
      - "8082:80"

  frontend:
    image: node:22-alpine
    container_name: pimis-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8081"
    environment:
      VITE_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    ports:
      - "8081:8081"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
      mysql:
        condition: service_healthy
      phpmyadmin:
        condition: service_started

volumes:
  mysql_data:
  frontend_node_modules:
